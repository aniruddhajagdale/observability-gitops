apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.3.1
    helm:
      values: |
        grafana:
          enabled: true
          adminPassword: admin
          nodeSelector:
            node-type: high-perf

        resources:
          requests:
            cpu: 50m
            memory: 128Mi

        prometheus:
          prometheusSpec:
            retention: 2d
            resources:
              requests:
                cpu: 100m
                memory: 512Mi

        alertmanager:
          enabled: false   # disable (saves memory)

        kubeStateMetrics:
          enabled: false   # disable

        nodeExporter:
          enabled: true    # keep (lightweight)

        prometheusOperator:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true