apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.3.1
    helm:
      values: |
        prometheusOperator:
          createCustomResource: false   # 🔥 critical

        grafana:
          enabled: true
          adminPassword: admin

        prometheus:
          prometheusSpec:
            retention: 2d

        alertmanager:
          enabled: false

        kubeStateMetrics:
          enabled: false

        nodeExporter:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
